<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --red:       #D42B35;
  --red-dk:    #a8202a;
  --bg:        #F4F5F7;
  --white:     #FFFFFF;
  --surface:   #FFFFFF;
  --border:    #E0E3E8;
  --text:      #1A1D23;
  --muted:     #6B7280;
  --gold:      #C47F17;
  --gold-bg:   #FEF9EE;
  --gold-bdr:  #F5D78A;
  --green:     #0D7A4E;
  --green-bg:  #ECFDF5;
  --green-bdr: #A7F3D0;
  --blue:      #1D4ED8;
  --blue-bg:   #EFF6FF;
  --blue-bdr:  #BFDBFE;
  --red-bg:    #FEF2F2;
  --red-bdr:   #FECACA;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1a0508 0%, #2d0a10 40%, #1A1D23 100%);
}
.login-card {
  width: 400px;
  background: var(--white);
  border-radius: 16px;
  padding: 48px 44px 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.login-logo { font-size: 32px; font-weight: 800; color: var(--red); letter-spacing: -1px; margin-bottom: 4px; }
.login-logo span { color: var(--text); }
.login-tagline { font-size: 13px; color: var(--muted); margin-bottom: 32px; text-align: center; }
.login-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.login-input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 15px; color: var(--text);
  outline: none; margin-bottom: 16px; transition: border-color .15s;
}
.login-input:focus { border-color: var(--red); }
.btn-login {
  width: 100%; padding: 13px;
  background: var(--red); color: #fff; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: background .15s;
}
.btn-login:hover { background: var(--red-dk); }
#login-err { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }

header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: var(--shadow);
}
.brand { font-size: 20px; font-weight: 800; color: var(--red); letter-spacing: -.5px; }
.brand span { color: var(--text); }
.hdr-right { display: flex; align-items: center; gap: 16px; }

.main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 80px; }

</style>

<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Alert<span>Pro</span></div>
    <div class="login-tagline">Agent Portal</div>
    <label class="login-label" for="username">Username</label>
    <input class="login-input" type="text" id="username" placeholder="jdoe" autofocus>
    <label class="login-label" for="password">Password</label>
    <input class="login-input" type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    <button class="btn-login" onclick="login()">Sign In</button>
    <div id="login-err">Invalid username or password.</div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="brand">Alert<span>Pro</span> <span id="agent-name-header"></span></div>
    <div class="hdr-right">
      <button onclick="logout()" style="background:#fee2e2; color:#dc2626; border:1px solid #fecaca; padding:6px 14px; border-radius:6px; cursor:pointer;">Logout</button>
    </div>
  </header>

  <div class="main">
    <h2 style="margin:0 0 24px;">Create Quote</h2>

      </button>
    </div>

    <div id="quotes-drawer" style="display:none; background:white; border:1px solid #e5e7eb; border-radius:8px; padding:20px; margin-top:20px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">

<script>

// CONFIG + DEMO USER
// ────────────────────────────────────────────────
const SHEETS_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID_HERE/exec"; // ← CHANGE THIS

const AGENTS = [
  { id: "jdoe", name: "John Doe", password: "kitkat123" }
];

let currentAgent = null;

// ────────────────────────────────────────────────
// LOGIN / LOGOUT
// ────────────────────────────────────────────────
function login() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const err = document.getElementById('login-err');

  const agent = AGENTS.find(a => a.id === u && a.password === p);

  if (!agent) {
    err.style.display = 'block';
    return;
  }

  currentAgent = agent;
  document.getElementById('agent-name-header').textContent = '— ' + agent.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  err.style.display = 'none';
}

function logout() {
  currentAgent = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}
